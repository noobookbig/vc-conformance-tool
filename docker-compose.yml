# docker-compose for the v2 conformance test tool (build + run from local source).
#
# Brings up the v2.0.0 image built from the local Dockerfile on port 8080.
# No external services required — the in-process mock issuer + verifier are
# mounted on the same origin, so a brand-new user can `docker compose up -d --build`
# and immediately exercise all four cross-modes.
#
# v2.0.0 ships source-only (the board picked `skip_ghcr` on MAS-278 at 13:42:07Z);
# there is no GHCR image to pull. This is the v2 counterpart to the v0.1.0 dev
# compose at ops/docker/docker-compose.yml. For the v0.1.0 dev compose, see
# ops/docker/docker-compose.yml.

services:
  vc-conformance-v2:
    build:
      context: .
      dockerfile: ops/docker-v2/Dockerfile
    image: vc-conformance-v2:2.0.0
    container_name: vc-conformance-v2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CONFORMANCE_BASE_URL=http://127.0.0.1:8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
