# docker-compose for the v2 conformance test tool (build + run from local source).
#
# Brings up the v2.0.0 image built from the local Dockerfile on port 8080
# as the `web` service, and exposes a one-shot `runner` service that
# executes the v2 CLI in the container — including the new
# `--role issuer|verifier|wallet` filter shipped on MAS-292.
#
# Two ways to use the runner:
#
#   # 1) Pass the role through docker compose `run`:
#   docker compose run --rm runner -- --role issuer
#
#   # 2) Pin the role in the compose file via the ROLE env var:
#   ROLE=verifier docker compose run --rm runner
#
# Default behaviour (no `--role`, no `ROLE` env) is preserved: every case
# in the catalog runs. The `runner` service is one-shot — it exits with
# the CLI's exit code and is removed by `--rm`.
#
# The `web` service is the long-running HTTP server (UI mode). Kanit +
# neon theme assets are bundled in the image by the `ui-build` stage of
# ops/docker-v2/Dockerfile; the Google Fonts CDN link in index.html is
# loaded client-side, so no compose-level change is needed for the
# font swap done in MAS-296.
#
# No external services required — the in-process mock issuer + verifier
# are mounted on the same origin, so a brand-new user can `docker
# compose up -d --build` and immediately exercise all four cross-modes.
#
# v2.0.0 ships source-only (the board picked `skip_ghcr` on MAS-278 at
# 13:42:07Z); there is no GHCR image to pull. This is the v2 counterpart
# to the v0.1.0 dev compose at ops/docker/docker-compose.yml. For the
# v0.1.0 dev compose, see ops/docker/docker-compose.yml.

services:
  web:
    build:
      context: .
      dockerfile: ops/docker-v2/Dockerfile
    image: vc-conformance-v2:2.0.0
    container_name: vc-conformance-v2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CONFORMANCE_BASE_URL=http://127.0.0.1:8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # One-shot CLI runner. Invoke with `docker compose run --rm runner
  # --role issuer` (any CLI flag is appended to the v2 CLI; the wrapper
  # at ops/docker-v2/v2-runner.sh provides sensible defaults when no
  # args are given). Reports land in the bind-mounted /out on the host
  # so the JSON / JUnit / HTML artefacts are visible after the container
  # exits.
  runner:
    build:
      context: .
      dockerfile: ops/docker-v2/Dockerfile
    image: vc-conformance-v2:2.0.0
    # Entrypoint stays stable across `docker compose run` overrides; the
    # wrapper adds --config/--catalog/--out defaults, folds in the
    # ROLE/INCLUDE_COVERAGE env vars when set, then execs the v2 CLI
    # with any user-supplied args ($@). See ops/docker-v2/v2-runner.sh.
    entrypoint: ["/usr/local/bin/v2-runner.sh"]
    # `command:` (not entrypoint) is what `docker compose run --rm
    # runner ARGS` overrides, so the user can append flags here without
    # losing the wrapper.
    command: []
    environment:
      - ROLE=${ROLE:-}
      - INCLUDE_COVERAGE=${INCLUDE_COVERAGE:-}
    volumes:
      - .:/workspace
      - ./out:/out
    working_dir: /workspace
    profiles: ["cli"]
