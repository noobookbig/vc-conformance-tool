# Real-target fixtures for the vc-conformance-test:0.1.0 webapp.
#
# This file is consumed by QA (and any automation) that needs to point the
# conformance tool at a real Thai issuer / verifier. Each entry is loaded
# into the webapp's Configuration via the API (PUT /api/config or
# POST /api/runs body), or typed into the UI's Target URL field.
#
# Schema (per target entry, under `targets:`):
#   id:                short stable identifier (no spaces)
#   label:             human-readable name shown in reports
#   baseUrl:           base URL the tool hits — exactly the value placed in
#                      targetIssuer / targetVerifier
#   kind:              issuer | verifier
#   category:          thai-public-sandbox | pilot-tenant | in-repo-local
#                      | external-pid
#   status:            reachable | requires-credentials | unreachable
#   credentials:       list of credential_configurations_supported entries
#     - configurationId:   the credential_configuration_id used in the
#                          authorization_details / Credential Request
#       vct:               SD-JWT VC type identifier (matches the
#                          corrected v2.0 testcase convention for Thai
#                          National ID)
#       format:            jwt_vc_json | dc+sd-jwt | dc+jwt
#       scope:             OAuth 2.0 scope the issuer requires
#   issuerMetadata:    null for non-issuer entries; otherwise the JSON the
#                      target serves at
#                      ${baseUrl}/.well-known/openid-credential-issuer
#                      (the tool auto-fetches this at run start, so
#                      filling it in here is for QA reference only)
#   auth:              how the holder reaches the issuer
#     grant:            authorization_code | pre-authorized_code
#     pkce:             true|false (always true per the corrected testcase)
#     authorizationDetailsRequired: true|false
#     txCode:           pre-authorized-code flow only — true if a tx_code
#                       must be supplied by the user
#     clientId:         client_id registered at the issuer (pre-authorized
#                       flows often use a public client_id, no secret)
#     clientSecretEnv:  env var name holding the client secret for
#                       confidential clients. NEVER put the secret in
#                       this file.
#   trust:
#     issuerDids:       DIDs the verifier / wallet trust as issuers
#     verifierAcceptsKbJwtAlgs: [ES256, EdDSA, ...]
#   notes:             free-form text — reachability caveats, auth quirks,
#                      known issues
#
# See the README in this directory for how to plug an entry into the tool.

version: 1
schemaNote: |
  Schema is intentionally permissive: extra keys are ignored, missing
  required keys fail loudly at the API boundary. Do not commit real
  client_secret values — reference them via clientSecretEnv.

targets:

  # ---------------------------------------------------------------------------
  # Entry 1 — in-repo local mock (replacement for the previously mentioned
  # in-repo apps/issuer + apps/verifier services, which are no longer
  # present in the working tree). This is the SAME mock the conformance
  # tool ships with by default; we document it here so QA has a config
  # snippet that always works and so that a future swap to a real target
  # is a one-line change (replace the baseUrl / configurationId).
  # ---------------------------------------------------------------------------
  - id: in-repo-mock
    label: In-repo mock (default, no external dependency)
    kind: issuer
    category: in-repo-local
    status: reachable
    baseUrl: http://127.0.0.1:8080
    credentials:
      - configurationId: ThaiNationalID
        vct: https://schemas.etda.or.th/thai-national-id/v1
        format: jwt_vc_json
        scope: th_national_id
    issuerMetadata:
      credential_issuer: http://127.0.0.1:8080/.mock/issuer
      authorization_servers: [http://127.0.0.1:8080/.mock/issuer]
      credential_endpoint: http://127.0.0.1:8080/.mock/issuer/credential
      deferred_credential_endpoint: http://127.0.0.1:8080/.mock/issuer/credential/deferred
      notification_endpoint: http://127.0.0.1:8080/.mock/issuer/notification
      credential_configurations_supported:
        ThaiNationalID:
          format: jwt_vc_json
          scope: th_national_id
          cryptographic_binding_methods_supported: [jwk]
          credential_signing_alg_values_supported: [ES256]
          proof_types_supported:
            jwt:
              proof_signing_alg_values_supported: [ES256, EdDSA]
    auth:
      grant: authorization_code
      pkce: true
      authorizationDetailsRequired: false
      txCode: false
      clientId: vc-conformance-test-wallet
      clientSecretEnv: null
    trust:
      issuerDids: [did:example:mock-issuer]
      verifierAcceptsKbJwtAlgs: [ES256, EdDSA]
    notes: |
      The in-process mock is the lowest-risk target. It is the SAME
      endpoint the webapp exercises in `bash ops/smoke/run.sh` (56/56
      baseline). Use this for regression smoke and for verifying the
      tool itself is healthy before pointing at any real target.

  # ---------------------------------------------------------------------------
  # Entry 2 — Procivis One Core (self-hosted, local), OID4VCI 1.0 issuer.
  # Filled in MAS-161 (2026-06-09). This is the real OID4VCI 1.0 Final
  # target the QA team uses today. See ops/procivis-sandbox/README.md
  # for how to stand it up and seed it (the schema/credential/DID IDs
  # below are re-issued every time the DB is reset; treat them as
  # ephemeral and re-run the setup script to get fresh values).
  # ---------------------------------------------------------------------------
  - id: th-public-sandbox-procivis
    label: Procivis One Core — local OID4VCI 1.0 issuer (self-hosted, Thai National ID profile)
    kind: issuer
    category: thai-public-sandbox
    status: reachable
    baseUrl: http://127.0.0.1:3000
    credentials:
      - configurationId: http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
        vct: http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
        format: dc+sd-jwt
        scope: http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
    issuerMetadata:
      credential_issuer: http://localhost:3000/ssi/openid4vci/final-1.0/OPENID4VCI_FINAL1/c8eb0c5d-fc67-4e55-aa59-57cd1689dff9/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
      credential_endpoint: http://localhost:3000/ssi/openid4vci/final-1.0/3a3bdd96-c8a1-410f-822b-15fee11d9e7c/credential
      nonce_endpoint: http://localhost:3000/ssi/openid4vci/final-1.0/OPENID4VCI_FINAL1/nonce
      notification_endpoint: http://localhost:3000/ssi/openid4vci/final-1.0/3a3bdd96-c8a1-410f-822b-15fee11d9e7c/notification
      credential_configurations_supported:
        "http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c":
          format: dc+sd-jwt
          vct: http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
          scope: http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c
          cryptographic_binding_methods_supported: [jwk, did:ion, did:web, did:jwk, did:tdw, did:key]
          credential_signing_alg_values_supported: [ES256, EdDSA, ML-DSA-65]
          proof_types_supported:
            jwt:
              proof_signing_alg_values_supported: [BBS_PLUS, ES256, EdDSA, EDDSA, ML-DSA-65]
    auth:
      grant: authorization_code
      pkce: true
      authorizationDetailsRequired: false
      txCode: false
      clientId: vc-conformance-test-wallet
      clientSecretEnv: null
    trust:
      issuerDids: [did:web:localhost:3000:c8eb0c5d-fc67-4e55-aa59-57cd1689dff9]
      verifierAcceptsKbJwtAlgs: [ES256, EdDSA, ML-DSA-65]
    notes: |
      Procivis One Core (self-hosted, Docker + MariaDB) running at
      http://127.0.0.1:3000. Real OpenID4VCI 1.0 + OpenID4VP 1.0 stack,
      not the in-process mock. Probe timestamp: 2026-06-09T07:36Z.
      See ops/procivis-sandbox/README.md for start/stop.
      Auth is UNSAFE_STATIC (bearer token = "test") — for local dev only.
      The Thai National ID vct is the long-term goal; the entry uses
      the SD-JWT VC schema provisioned at startup (claims:
      id, given_name, family_name, birthdate).
      The configurationId, vct, and scope are all the same URL because
      Procivis uses the schemaId as the OID4VCI credential identifier
      in the well-known metadata.
      DID updated to current session's issuer-did:
      did:web:localhost:3000:c8eb0c5d-fc67-4e55-aa59-57cd1689dff9

  # ---------------------------------------------------------------------------
  # Entry 3 — Procivis One Core (self-hosted, local), OID4VP draft-25 verifier.
  # Filled in MAS-161 (2026-06-09). Same instance as the issuer entry
  # (Procivis speaks both OID4VCI and OID4VP on the same port). The
  # proof-request IDs are ephemeral; re-run setup-issuer-and-verifier.sh
  # to get fresh values after a DB reset.
  # ---------------------------------------------------------------------------
  - id: th-public-verifier-procivis
    label: Procivis One Core — local OID4VP draft-25 verifier (self-hosted, Thai National ID profile)
    kind: verifier
    category: thai-public-sandbox
    status: reachable
    baseUrl: http://127.0.0.1:3000
    authorizationRequestEndpoint: http://127.0.0.1:3000/ssi/openid4vp/draft-25/12c37203-a0cb-4de3-97bd-e918005c0b41/client-request
    responseMode: direct_post
    responseUri: http://127.0.0.1:3000/ssi/openid4vp/draft-25/response
    clientId: verifier_attestation:http://localhost:3000/ssi/openid4vp/draft-25/response
    dcqlQuery:
      credentials:
        - id: thai-national-id
          format: dc+sd-jwt
          meta:
            vct_values: [http://localhost:3000/ssi/vct/v1/262e3de8-c5ca-4013-9ed4-d95131d2ceb3/3a3bdd96-c8a1-410f-822b-15fee11d9e7c]
    trust:
      acceptedIssuerDids: [did:web:localhost:3000:c8eb0c5d-fc67-4e55-aa59-57cd1689dff9]
      acceptedKbJwtAlgs: [ES256, EdDSA, ML-DSA-65]
    notes: |
      Same Procivis One Core instance as the issuer entry
      (Procivis speaks both OID4VCI and OID4VP on the same port).
      Probe timestamp: 2026-06-09T07:36Z.
      The authorizationRequestEndpoint is the HTTP form of the
      request_uri (the wallet can hit it directly without following
      the openid4vp-draft25:// custom URL scheme). The responseUri is
      the verifier's /ssi/openid4vp/draft-25/response endpoint.
      DID updated to current session's issuer-did:
      did:web:localhost:3000:c8eb0c5d-fc67-4e55-aa59-57cd1689dff9

